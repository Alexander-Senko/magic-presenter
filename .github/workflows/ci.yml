name: CI

on:
  push:
    branches:
      - main
    tags-ignore:
      - '*'
    paths:
      - lib/**
      - app/**
      - config/**
      - spec/**
      - Gemfile*
      - '*.gemspec'
      - .github/workflows/ci.yml
      - .rspec*
      - .rubocop*
      - '!**/version.rb'

  pull_request:
    paths-ignore:
      - '*.md'
      - '*.txt'
      - '**/version.rb'

permissions: read-all

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      BUNDLE_WITHOUT: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Ruby (RubyGems)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ vars.RUBY_VERSION }}
          bundler:      none
      - name: Pre-install gems
        run:  gem install -N rubygems-author
        env:
          GEM_HOME: vendor/bundle/ruby/${{ vars.RUBY_VERSION }}.0
      - name: Set up Ruby (Bundler)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version:  ${{ vars.RUBY_VERSION }}
          bundler-cache: true
          rubygems:      default # skip

      - name: Lint code for consistent style
        run:  bin/rubocop -f github

  test:
    runs-on: ubuntu-latest
    name:    Ruby ${{ matrix.ruby }}, Rails ${{ matrix.rails }}
    permissions:
      contents: read
      id-token: write
    strategy:
      matrix:
        ruby:
          - 4.0
          - 3.4
          - 3.3
          - 3.2

          - truffleruby
          - truffleruby-head

        rails:
          - 8.1
          - 8.0
          - 7.2

        include:
          - { ruby: head, rails: head }

    env:
      RAILS_VERSION:  ${{ matrix.rails }}
      BUNDLE_WITHOUT: development

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Ruby (RubyGems)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler:      none
      - name: Pre-install gems
        id:   pre-install
        run: |
          gem install -N rubygems-author
          gem info       rubygems-author |
              ruby -e 'puts $stdin.read.sub /\A(\S+) \((.+)\).*Installed at: (\S+).*\z/m, "\\3/gems/\\1-\\2"' |
              xargs -I {} echo RUBYLIB={}/lib >> $GITHUB_ENV
      - name: Set up Ruby (Bundler)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version:  ${{ matrix.ruby }}
          bundler-cache: true
          rubygems:      default # skip

      - name: Run specs with code coverage
        run: bundle exec rake
        continue-on-error: ${{ matrix.allow-fail || false }}
        id: test

      - name: Upload coverage to Qlty Cloud
        if:   ${{ matrix.ruby == 'head' && steps.test.outcome == 'success' }}
        uses: qltysh/qlty-action/coverage@v2
        with:
          oidc:   true
          files:  coverage/.resultset.json
          format: simplecov

      - name: Test ${{ steps.test.outcome }}
        run: |
          ruby -v
          bin/rails -v
